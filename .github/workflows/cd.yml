name: Deploy to Github Page

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
    #branches:
    #  - main

jobs:
    build-prod-job:
        runs-on: ubuntu-latest
        steps:
            - name: Clone Repo
              uses: actions/checkout@v6 # ดึง code มาที่ action เพื่อทำอะไรบางอย่าง
            - name: Setup Node.js version to 24.x
              uses: actions/setup-node@v6
              with:
                node-version: '24.x'
                cache: 'npm'
            - name: Install dependencies
              run: npm ci # เร็วกว่า install - clean install
            - name: Build project (production and create dist folder)
              run: npm run build
            - name: Upload dist folder artifact
              uses: actions/upload-artifact@v7
              with:
                name: dist-production
                path: dist

    auto-deploy-github-page:
        runs-on: ubuntu-latest
        needs: build-prod-job # sequential jobs
        permissions:
            contents: write
        steps:
            - name: Download dist folder artifact
              uses: actions/download-artifact@v7
              with:
                name: dist-prodution
                path: dist
            - run: ls dist
            - uses: actions/checkout@v6 
            - name: Deploy to Github Page
              uses: SerhiiKa/VuePagesAction@1.0.4
              with:
                username: ${{ github.actor }}
                reponame: ${{ github.event.repository.name }}
                token: ${{ secrets.GITHUB_TOKEN }}