name: Frontend Workshop Demo

on:
    push:
        branches:
            - main # ปกติไม่ push main
            - 'feature/**'
            - 'bugfix/**'
            - 'chore/**'
    pull_request:
        branches:
            - main


jobs:
    lint-job:
        runs-on: ubuntu-latest
        steps:
            - run: echo "Hello World"
            - uses: actions/checkout@v6 # ดึง code มาที่ action เพื่อทำอะไรบางอย่าง
            - uses: actions/setup-node@v6
              with:
                node-version: '24.x'
                cache: 'npm'
            - run: node -v
            - run: npm ci # เร็วกว่า install - clean install
            - run: npm run lint

    build-job:
        runs-on: ubuntu-latest
        needs: lint-job # sequential jobs
        steps:
            - name: Clone Repo
              uses: actions/checkout@v6 # ดึง code มาที่ action เพื่อทำอะไรบางอย่าง
            - name: Setup Node.js version to 24.x
              uses: actions/setup-node@v6
              with:
                node-version: '24.x'
                cache: 'npm'
            - name: Install dependencies
              run: npm ci # เร็วกว่า install - clean install
            - name: Build project
              run: npm run build